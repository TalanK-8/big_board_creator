<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>NFL Big Board 2027</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="top-bar">
        <div class="left-tabs">
            <button id="compare-tab-btn">COMPARE</button>
            <button id="favorites-tab-btn">FAVORITES</button>
            <button id="watchlist-tab-btn">WATCHLIST</button>
        </div>

        <h1 class="main-title">BIG BOARD</h1>

        <div class="right-tabs">
            <button id="settings-tab-btn">SETTINGS</button>
            <button id="download-board-btn">EXPORT</button>
        </div>
    </div>

    <div class="container">
        <!-- LEFT SIDEBAR -->
        <div class="sidebar" ondragover="allowDrop(event)" ondrop="dropBackToSidebar(event)">
            <h2>Players</h2>
            <input type="text" id="player-search" placeholder="Search players..." oninput="handleSearch(this.value)"
                class="search-bar" />
            <!--Unit selection-->
            <div class="unit-buttons">
                <button onclick="selectUnit('all')">ALL</button>
                <button onclick="selectUnit('offense')">OFFENSE</button>
                <button onclick="selectUnit('defense')">DEFENSE</button>
                <button onclick="selectUnit('special')">SPECIAL TEAMS</button>
            </div>

            <!-- Position selection-->
            <div class="position-buttons" id="position-buttons">

            </div>

            <!-- Players will go here -->
            <div id="player-list"></div>
        </div>

        <!--RIGHT BOARD-->
        <div class="board">
            <p class="disclaimer">*Not affiliated with NFL or NCAA</p>

            <!-- ROUND 1 -->
            <div class="round" data-round="1">
                <h2 class="round-title">1st Round</h2>

                <div class="rank-list" ondragover="allowDrop(event)" ondrop="dropIntoRound(event)">
                </div>
            </div>

            <!-- ROUND 2 -->
            <div class="round" data-round="2">
                <h2 class="round-title">2nd Round</h2>

                <div class="rank-list" ondragover="allowDrop(event)" ondrop="dropIntoRound(event)">
                </div>
            </div>

            <!-- ROUND 3 -->
            <div class="round" data-round="3">
                <h2 class="round-title">3rd Round</h2>

                <div class="rank-list" ondragover="allowDrop(event)" ondrop="dropIntoRound(event)">
                </div>
            </div>

            <!-- ROUND 4 -->
            <div class="round" data-round="4">
                <h2 class="round-title">4th Round</h2>

                <div class="rank-list" ondragover="allowDrop(event)" ondrop="dropIntoRound(event)">
                </div>
            </div>

            <!-- ROUND 5 -->
            <div class="round" data-round="5">
                <h2 class="round-title">5th Round</h2>

                <div class="rank-list" ondragover="allowDrop(event)" ondrop="dropIntoRound(event)">
                </div>
            </div>

            <!-- ROUND 6 -->
            <div class="round" data-round="6">
                <h2 class="round-title">6th Round</h2>

                <div class="rank-list" ondragover="allowDrop(event)" ondrop="dropIntoRound(event)">
                </div>
            </div>

            <!-- ROUND 7 -->
            <div class="round" data-round="7">
                <h2 class="round-title">7th Round</h2>

                <div class="rank-list" ondragover="allowDrop(event)" ondrop="dropIntoRound(event)">
                </div>
            </div>

            <!-- UDFA -->
            <div class="round" data-round="8">
                <h2 class="round-title">UDFA</h2>

                <div class="rank-list" ondragover="allowDrop(event)" ondrop="dropIntoRound(event)">
                </div>
            </div>

        </div>
    </div>

    <div id="player-modal" class="player-modal">
        <div class="modal-content">

            <span id="modal-close" class="modal-close">&times;</span>

            <!-- Top Player Card -->
            <div class="profile-card">

                <!-- LEFT SIDE -->
                <div class="profile-info-section">
                    <div id="profile-info"></div>
                </div>


                <!-- CENTER -->
                <div class="profile-grade-section">
                    <h1 id="overall-grade">--</h1>
                    <button id="edit-grade-btn">Edit</button>
                </div>


                <!-- RIGHT SIDE -->
                <div class="profile-actions"></div>

            </div>

            

            <!-- Profile Tabs -->
            <div class="profile-tabs">
                <button class="profile-tab active" data-tab="notes">
                    Notes
                </button>

                <button class="profile-tab" data-tab="stats">
                    Stats
                </button>

                <button class="profile-tab" data-tab="physicals">
                    Physicals
                </button>

                <button class="profile-tab" data-tab="traits">
                    Traits
                </button>
            </div>


            <!-- Tab Content -->
            <div id="profile-tab-content">

            </div>

        </div>
    </div>
    <script src="script.js"></script>
    <script src="board.js"></script>
    <script src="modal.js"></script>
</body>
</html>
